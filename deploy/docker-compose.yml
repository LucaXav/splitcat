version: "3.9"

# SplitCat VPS stack
# ------------------
# Bot (Node) + Caddy (TLS). Postgres is managed externally (Neon).
# Designed for a small VPS — Hetzner CX11 (1 vCPU, 2GB) is enough.
#
#   cp deploy/.env.example deploy/.env && nano deploy/.env
#   docker compose -f deploy/docker-compose.yml --env-file deploy/.env up -d --build

services:
  bot:
    build:
      context: ../bot
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      TIMEZONE: ${TIMEZONE:-Asia/Singapore}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET}
      PUBLIC_URL: ${PUBLIC_URL}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      DATABASE_URL: ${DATABASE_URL}
      MINI_APP_URL: ${MINI_APP_URL}
      MINI_APP_SECRET: ${MINI_APP_SECRET}
      EXCHANGERATE_API_KEY: ${EXCHANGERATE_API_KEY}
      NUDGE_CHECK_CRON: ${NUDGE_CHECK_CRON:-0 */6 * * *}
      CLAUDE_VISION_MODEL: ${CLAUDE_VISION_MODEL:-claude-opus-4-7}
      CLAUDE_MEME_MODEL: ${CLAUDE_MEME_MODEL:-claude-haiku-4-5-20251001}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks: [web]

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      PUBLIC_HOST: ${PUBLIC_HOST}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./volumes/caddy/data:/data
      - ./volumes/caddy/config:/config
    networks: [web]

networks:
  web:
